<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optima Learn - CAT Smart Study Planner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --navy: #1a2332;
            --navy-light: #2c3e50;
            --teal: #00d4aa;
            --teal-light: #4dd0c1;
            --blue: #3498db;
            --green: #27ae60;
            --orange: #e67e22;
            --white: #ffffff;
            --gray: #ecf0f1;
            --gray-dark: #7f8c8d;
            --red: #e74c3c;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%);
            color: var(--white);
            min-height: 100vh;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 30px 0;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            margin-bottom: 30px;
            border-radius: 15px;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: bold;
            background: linear-gradient(45deg, var(--teal), var(--teal-light));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .tagline {
            color: var(--teal-light);
            font-size: 1.1rem;
        }

        .view {
            display: none;
            animation: fadeIn 0.3s ease-in;
        }

        .view.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--teal-light);
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: var(--white);
            font-size: 16px;
            transition: all 0.3s ease;
        }

        select {
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6,9 12,15 18,9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 20px;
            padding-right: 40px;
        }

        select option {
            background: var(--navy);
            color: var(--white);
            padding: 10px;
        }

        select::-webkit-scrollbar {
            width: 8px;
        }

        select::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        select::-webkit-scrollbar-thumb {
            background: var(--teal);
            border-radius: 4px;
        }

        select::-webkit-scrollbar-thumb:hover {
            background: var(--teal-light);
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--teal);
            background: rgba(255, 255, 255, 0.15);
        }

        input[type="date"] {
            cursor: pointer;
        }

        .proficiency-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 10px;
        }

        .proficiency-item {
            text-align: center;
        }

        .section-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 0.9rem;
        }

        .qa { background: var(--blue); }
        .varc { background: var(--green); }
        .dilr { background: var(--orange); }

        .rating-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }

        .rating-btn {
            width: 40px;
            height: 40px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.1);
            color: var(--white);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .rating-btn:hover {
            border-color: var(--teal);
            transform: scale(1.1);
        }

        .rating-btn.selected {
            background: var(--teal);
            border-color: var(--teal);
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: linear-gradient(45deg, var(--teal), var(--teal-light));
            color: var(--navy);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 212, 170, 0.3);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.2);
            color: var(--white);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .api-key-section {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .api-key-input {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .api-key-input input {
            flex: 1;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: var(--teal);
            margin-bottom: 5px;
        }

        .stat-label {
            color: var(--gray-dark);
            font-size: 0.9rem;
        }

        .study-plan {
            margin-top: 30px;
        }

        .section-plan {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 4px solid;
        }

        .section-plan.qa { border-left-color: var(--blue); }
        .section-plan.varc { border-left-color: var(--green); }
        .section-plan.dilr { border-left-color: var(--orange); }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .section-title {
            font-size: 1.2rem;
            font-weight: bold;
        }

        .time-allocated {
            background: rgba(255, 255, 255, 0.2);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
        }

        .task-list {
            list-style: none;
            margin: 15px 0;
        }

        .task-list li {
            padding: 8px 0;
            padding-left: 25px;
            position: relative;
        }

        .task-list li:before {
            content: "✓";
            position: absolute;
            left: 0;
            color: var(--teal);
            font-weight: bold;
        }

        .resource {
            background: rgba(0, 212, 170, 0.1);
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
            font-size: 0.9rem;
        }

        .motivational-tip {
            background: linear-gradient(45deg, rgba(0, 212, 170, 0.1), rgba(77, 208, 193, 0.1));
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
            text-align: center;
            font-style: italic;
            border: 1px solid rgba(0, 212, 170, 0.3);
        }

        .progress-section {
            margin-top: 30px;
        }

        .progress-options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }

        .progress-card {
            background: rgba(255, 255, 255, 0.08);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            min-height: 180px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .progress-buttons {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 15px;
        }

        .progress-btn {
            padding: 10px 12px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.1);
            color: var(--white);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.85rem;
            text-align: center;
            min-width: 100px;
        }

        .progress-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .progress-btn.selected {
            background: var(--teal);
            border-color: var(--teal);
            color: var(--navy);
        }

        .loader {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top: 3px solid var(--teal);
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            background: rgba(231, 76, 60, 0.1);
            border: 1px solid var(--red);
            color: var(--red);
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
        }

        .success-message {
            background: rgba(39, 174, 96, 0.1);
            border: 1px solid var(--green);
            color: var(--green);
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
        }

        .weak-area {
            background: rgba(231, 76, 60, 0.1);
            border: 1px solid var(--red);
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }
            
            .card {
                padding: 20px;
            }
            
            .logo {
                font-size: 2rem;
            }
            
            .btn-group {
                flex-direction: column;
            }
            
            .dashboard {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">Optima Learn</div>
            <div class="tagline">AI-Powered CAT Exam Preparation</div>
        </header>

        <!-- API Key Section -->
        <div class="api-key-section">
            <div class="form-group">
                <label for="apiKey">Gemini API Key</label>
                <div class="api-key-input">
                    <input type="password" id="apiKey" placeholder="Enter your Gemini API key">
                    <button class="btn btn-secondary" onclick="saveApiKey()">Save</button>
                    <button class="btn btn-secondary" onclick="testApiKey()">Test</button>
                </div>
            </div>
        </div>

        <!-- Onboarding View -->
        <div id="onboardingView" class="view active">
            <div class="card">
                <h2 style="margin-bottom: 30px; text-align: center;">Welcome to Your CAT Study Journey</h2>
                <form id="onboardingForm">
                    <div class="form-group">
                        <label for="examDate">CAT Exam Date</label>
                        <input type="date" id="examDate" required>
                    </div>

                    <div class="form-group">
                        <label>Self-Rate Your Proficiency (1-5)</label>
                        <div class="proficiency-grid">
                            <div class="proficiency-item">
                                <span class="section-badge qa">QA</span>
                                <div class="rating-selector" data-section="qa">
                                    <button type="button" class="rating-btn" data-value="1">1</button>
                                    <button type="button" class="rating-btn" data-value="2">2</button>
                                    <button type="button" class="rating-btn" data-value="3">3</button>
                                    <button type="button" class="rating-btn" data-value="4">4</button>
                                    <button type="button" class="rating-btn" data-value="5">5</button>
                                </div>
                            </div>
                            <div class="proficiency-item">
                                <span class="section-badge varc">VARC</span>
                                <div class="rating-selector" data-section="varc">
                                    <button type="button" class="rating-btn" data-value="1">1</button>
                                    <button type="button" class="rating-btn" data-value="2">2</button>
                                    <button type="button" class="rating-btn" data-value="3">3</button>
                                    <button type="button" class="rating-btn" data-value="4">4</button>
                                    <button type="button" class="rating-btn" data-value="5">5</button>
                                </div>
                            </div>
                            <div class="proficiency-item">
                                <span class="section-badge dilr">DILR</span>
                                <div class="rating-selector" data-section="dilr">
                                    <button type="button" class="rating-btn" data-value="1">1</button>
                                    <button type="button" class="rating-btn" data-value="2">2</button>
                                    <button type="button" class="rating-btn" data-value="3">3</button>
                                    <button type="button" class="rating-btn" data-value="4">4</button>
                                    <button type="button" class="rating-btn" data-value="5">5</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="dailyHours">Daily Study Hours Available</label>
                        <select id="dailyHours" required>
                            <option value="">Select hours</option>
                            <option value="1">1 hour</option>
                            <option value="2">2 hours</option>
                            <option value="3">3 hours</option>
                            <option value="4">4 hours</option>
                            <option value="5">5 hours</option>
                            <option value="6">6 hours</option>
                            <option value="7">7 hours</option>
                            <option value="8">8 hours</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="targetPercentile">Target Percentile</label>
                        <select id="targetPercentile" required>
                            <option value="">Select target</option>
                            <option value="90">90+ percentile</option>
                            <option value="95">95+ percentile</option>
                            <option value="99">99+ percentile</option>
                        </select>
                    </div>

                    <div class="btn-group">
                        <button type="submit" class="btn btn-primary" style="width: 100%;">Generate My Study Plan</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Dashboard View -->
        <div id="dashboardView" class="view">
            <div class="dashboard">
                <div class="stat-card">
                    <div class="stat-value" id="streakCount">0</div>
                    <div class="stat-label">Day Streak</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="daysLeft">0</div>
                    <div class="stat-label">Days Until CAT</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="todayFocus">-</div>
                    <div class="stat-label">Today's Focus</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="weeklyGoal">0%</div>
                    <div class="stat-label">Weekly Progress</div>
                </div>
            </div>

            <div id="weakAreaContainer"></div>

            <div class="study-plan">
                <h3 style="margin-bottom: 20px;">Today's Study Plan</h3>
                <div id="planContainer"></div>
                <div id="motivationalTip"></div>
            </div>

            <div class="progress-section">
                <h3 style="margin-bottom: 20px;">Progress Check-in</h3>
                <div id="progressContainer"></div>
                <div class="btn-group">
                    <button class="btn btn-primary" onclick="submitProgress()" style="width: 100%;">Submit Progress & Generate Tomorrow's Plan</button>
                </div>
            </div>

            <div class="btn-group">
                <button class="btn btn-secondary" onclick="resetProfile()">Reset Profile</button>
                <button class="btn btn-secondary" onclick="regeneratePlan()">Regenerate Today's Plan</button>
            </div>
        </div>
    </div>

    <script>
        // Global state
        let userProfile = null;
        let currentPlan = null;
        let progressData = {};

        // Initialize app
        document.addEventListener('DOMContentLoaded', function() {
            loadApiKey();
            loadUserProfile();
            setupEventListeners();
            setDefaultExamDate();
        });

        function setDefaultExamDate() {
            const examDateInput = document.getElementById('examDate');
            const defaultDate = new Date();
            defaultDate.setMonth(defaultDate.getMonth() + 6); // 6 months from now
            examDateInput.value = defaultDate.toISOString().split('T')[0];
            examDateInput.min = new Date().toISOString().split('T')[0];
        }

        function setupEventListeners() {
            // Form submission
            document.getElementById('onboardingForm').addEventListener('submit', handleOnboardingSubmit);

            // Rating buttons
            document.querySelectorAll('.rating-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const section = this.closest('.rating-selector').dataset.section;
                    const value = this.dataset.value;
                    
                    // Remove selected class from siblings
                    this.parentElement.querySelectorAll('.rating-btn').forEach(b => b.classList.remove('selected'));
                    // Add selected class to clicked button
                    this.classList.add('selected');
                    
                    // Store value
                    if (!userProfile) userProfile = {};
                    if (!userProfile.proficiency) userProfile.proficiency = {};
                    userProfile.proficiency[section] = parseInt(value);
                });
            });
        }

        function handleOnboardingSubmit(e) {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            const examDate = formData.get('examDate') || document.getElementById('examDate').value;
            const dailyHours = formData.get('dailyHours') || document.getElementById('dailyHours').value;
            const targetPercentile = formData.get('targetPercentile') || document.getElementById('targetPercentile').value;

            // Validate proficiency ratings
            if (!userProfile || !userProfile.proficiency) {
                showMessage('Please rate your proficiency in all sections', 'error');
                return;
            }

            const sections = ['qa', 'varc', 'dilr'];
            for (const section of sections) {
                if (!userProfile.proficiency[section]) {
                    showMessage(`Please rate your ${section.toUpperCase()} proficiency`, 'error');
                    return;
                }
            }

            // Create user profile
            userProfile = {
                examDate: examDate,
                dailyHours: parseInt(dailyHours),
                targetPercentile: parseInt(targetPercentile),
                proficiency: userProfile.proficiency,
                createdAt: new Date().toISOString()
            };

            // Save to localStorage
            localStorage.setItem('catUserProfile', JSON.stringify(userProfile));
            
            // Generate study plan
            generateStudyPlan();
        }

        async function generateStudyPlan() {
            const apiKey = document.getElementById('apiKey').value;
            if (!apiKey) {
                showMessage('Please enter your Gemini API key', 'error');
                return;
            }

            showLoading(true);
            
            try {
                const prompt = createPrompt();
                const response = await callGeminiAPI(prompt, apiKey);
                
                if (!response) {
                    throw new Error('Failed to get response from API');
                }
                
                let newPlan;
                try {
                    newPlan = JSON.parse(response);
                } catch (parseError) {
                    console.error('Failed to parse API response:', response);
                    throw new Error('Invalid response format from API');
                }
                
                // Validate the new plan structure
                if (!newPlan || !newPlan.sections || !Array.isArray(newPlan.sections)) {
                    console.error('Invalid plan structure:', newPlan);
                    throw new Error('API returned invalid study plan format');
                }
                
                currentPlan = newPlan;
                
                // Save current plan
                localStorage.setItem('currentStudyPlan', JSON.stringify(currentPlan));
                
                // Show dashboard
                showDashboard();
                
            } catch (error) {
                console.error('Error generating study plan:', error);
                showMessage('Failed to generate study plan. Please check your API key and try again.', 'error');
            } finally {
                showLoading(false);
            }
        }

        function createPrompt() {
            const today = new Date().toLocaleDateString();
            const daysUntilExam = Math.ceil((new Date(userProfile.examDate) - new Date()) / (1000 * 60 * 60 * 24));
            
            // Identify weak areas
            const weakAreas = Object.entries(userProfile.proficiency)
                .filter(([section, rating]) => rating <= 2)
                .map(([section]) => section.toUpperCase());

            return `You are an expert CAT exam coach creating a personalized daily study plan. 

CRITICAL: Return ONLY raw JSON - no markdown, no backticks, no formatting, no explanations. Just the JSON object.

User Profile:
- Exam Date: ${userProfile.examDate} (${daysUntilExam} days remaining)
- Daily Study Time: ${userProfile.dailyHours} hours
- Target Percentile: ${userProfile.targetPercentile}+
- Proficiency Levels: QA=${userProfile.proficiency.qa}/5, VARC=${userProfile.proficiency.varc}/5, DILR=${userProfile.proficiency.dilr}/5
- Weak Areas: ${weakAreas.length > 0 ? weakAreas.join(', ') : 'None identified'}

Create a balanced study plan for TODAY (${today}) that:
1. Focuses extra time on weak areas but doesn't neglect strengths
2. Uses the full ${userProfile.dailyHours} hours efficiently
3. Includes specific, actionable tasks
4. Recommends concrete resources
5. Provides a motivational tip

Return this exact JSON structure (replace placeholder content):
{
  "date": "${today}",
  "totalHours": ${userProfile.dailyHours},
  "sections": [
    { "name": "QA", "topic": "Specific topic name", "hours": 1.5, "tasks": ["Task 1", "Task 2"], "resource": "Specific resource recommendation" },
    { "name": "VARC", "topic": "Specific topic name", "hours": 1, "tasks": ["Task 1", "Task 2"], "resource": "Specific resource recommendation" },
    { "name": "DILR", "topic": "Specific topic name", "hours": 0.5, "tasks": ["Task 1", "Task 2"], "resource": "Specific resource recommendation" }
  ],
  "motivationalTip": "Brief motivational tip under 100 characters"
}`;
        }

        async function callGeminiAPI(prompt, apiKey, retryCount = 0) {
            console.log('Making API call to Gemini...');
            
            const requestBody = {
                contents: [{
                    parts: [{ text: prompt }]
                }]
            };
            
            console.log('Request body:', JSON.stringify(requestBody, null, 2));
            
            // First, if we haven't discovered models yet, try to discover them
            if (!window.availableModels) {
                try {
                    console.log('Discovering available models...');
                    const modelsResponse = await fetch(
                        `https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`
                    );
                    
                    if (modelsResponse.ok) {
                        const modelsData = await modelsResponse.json();
                        const textModels = modelsData.models
                            .filter(model => 
                                model.supportedGenerationMethods && 
                                model.supportedGenerationMethods.includes('generateContent')
                            )
                            .map(model => model.name.split('/').pop());
                        
                        console.log('Discovered models:', textModels);
                        window.availableModels = textModels;
                    }
                } catch (error) {
                    console.log('Could not discover models, using fallbacks');
                }
            }
            
            // Try discovered models first, then fallback models
            let modelsToTry = window.availableModels || [];
            const fallbackModels = ['gemini-pro', 'gemini-1.5-flash', 'gemini-1.5-pro'];
            
            // Add fallback models if not already in the list
            fallbackModels.forEach(model => {
                if (!modelsToTry.includes(model)) {
                    modelsToTry.push(model);
                }
            });
            
            console.log('Will try models:', modelsToTry);
            
            for (const model of modelsToTry) {
                try {
                    console.log('Trying model:', model);
                    
                    // Try both v1beta and v1 API versions
                    const apiVersions = ['v1beta', 'v1'];
                    let success = false;
                    
                    for (const apiVersion of apiVersions) {
                        try {
                            const response = await fetch(
                                `https://generativelanguage.googleapis.com/${apiVersion}/models/${model}:generateContent?key=${apiKey}`,
                                {
                                    method: "POST",
                                    headers: { "Content-Type": "application/json" },
                                    body: JSON.stringify(requestBody)
                                }
                            );

                            console.log(`Response status for ${apiVersion}:`, response.status);

                            if (response.ok) {
                                const responseText = await response.text();
                                console.log('Raw response:', responseText);

                                const data = JSON.parse(responseText);
                                console.log('Parsed response:', data);
                                
                                if (data.candidates && data.candidates[0] && data.candidates[0].content) {
                                    let result = data.candidates[0].content.parts[0].text;
                                    console.log('Raw extracted text:', result);
                                    
                                    // Clean up the response - remove markdown formatting if present
                                    result = result.replace(/```json\n?/g, '').replace(/```\n?/g, '').trim();
                                    console.log('Cleaned text:', result);
                                    
                                    // Try to parse as JSON to validate
                                    try {
                                        JSON.parse(result); // Validation
                                        // Store working model and API version for future calls
                                        window.workingModel = model;
                                        window.workingApiVersion = apiVersion;
                                        return result;
                                    } catch (parseError) {
                                        console.error('Response is not valid JSON:', parseError);
                                        continue; // Try next model
                                    }
                                }
                            } else if (response.status === 429) {
                                // Handle quota limit with retry
                                if (retryCount < 3) {
                                    const retryDelay = Math.pow(2, retryCount) * 5000; // 5s, 10s, 20s
                                    console.log(`Quota exceeded, retrying in ${retryDelay/1000}s... (attempt ${retryCount + 1}/3)`);
                                    await new Promise(resolve => setTimeout(resolve, retryDelay));
                                    return callGeminiAPI(prompt, apiKey, retryCount + 1);
                                }
                                throw new Error(`API quota exceeded after retries`);
                            } else {
                                console.log(`Model ${model} with ${apiVersion} returned status ${response.status}`);
                            }
                        } catch (versionError) {
                            console.log(`API version ${apiVersion} failed for model ${model}:`, versionError.message);
                            continue; // Try next API version
                        }
                    }
                } catch (error) {
                    console.log(`Model ${model} failed completely:`, error.message);
                    continue; // Try next model
                }
            }
            
            throw new Error('All available models failed. Please check your API key and try again.');
        }

        function showDashboard() {
            document.getElementById('onboardingView').classList.remove('active');
            document.getElementById('dashboardView').classList.add('active');
            
            updateDashboardStats();
            renderStudyPlan();
            renderProgressCheckIn();
        }

        function updateDashboardStats() {
            // Calculate days left
            const daysLeft = Math.ceil((new Date(userProfile.examDate) - new Date()) / (1000 * 60 * 60 * 24));
            document.getElementById('daysLeft').textContent = daysLeft;
            
            // Update streak (simplified - would need proper tracking in real app)
            const streak = localStorage.getItem('studyStreak') || '0';
            document.getElementById('streakCount').textContent = streak;
            
            // Today's focus (weakest area)
            const weakSection = Object.entries(userProfile.proficiency)
                .sort(([,a], [,b]) => a - b)[0][0];
            document.getElementById('todayFocus').textContent = weakSection.toUpperCase();
            
            // Weekly progress (mock data)
            document.getElementById('weeklyGoal').textContent = '75%';
            
            // Show weak area warning
            if (userProfile.proficiency[weakSection] <= 2) {
                document.getElementById('weakAreaContainer').innerHTML = 
                    `<div class="weak-area">
                        <strong>Focus Area:</strong> ${weakSection.toUpperCase()} needs improvement (Current level: ${userProfile.proficiency[weakSection]}/5)
                    </div>`;
            }
        }

        function renderStudyPlan() {
            if (!currentPlan) {
                console.error('No current plan available');
                return;
            }
            
            if (!currentPlan.sections || !Array.isArray(currentPlan.sections)) {
                console.error('Current plan has no sections array:', currentPlan);
                showMessage('Invalid study plan format. Please try regenerating.', 'error');
                return;
            }
            
            const container = document.getElementById('planContainer');
            container.innerHTML = '';
            
            currentPlan.sections.forEach(section => {
                if (!section) {
                    console.error('Invalid section data:', section);
                    return;
                }
                
                // Handle different property names from API
                const sectionName = section.name || section.section_name || 'Unknown';
                const topic = section.topic || 'No topic specified';
                const hours = section.hours || section.duration_hours || 0;
                const tasks = section.tasks || (section.task ? [section.task] : []);
                const resource = section.resource || section.outcome || 'No resource specified';
                
                const sectionDiv = document.createElement('div');
                sectionDiv.className = `section-plan ${sectionName.toLowerCase()}`;
                
                sectionDiv.innerHTML = `
                    <div class="section-header">
                        <div class="section-title">${sectionName}: ${topic}</div>
                        <div class="time-allocated">${hours}h</div>
                    </div>
                    <ul class="task-list">
                        ${tasks.map(task => `<li>${task}</li>`).join('')}
                    </ul>
                    <div class="resource">
                        <strong>Resource:</strong> ${resource}
                    </div>
                `;
                
                container.appendChild(sectionDiv);
            });
            
            // Render motivational tip
            document.getElementById('motivationalTip').innerHTML = 
                `<div class="motivational-tip">
                    <strong>💡 Today's Motivation:</strong> ${currentPlan.motivationalTip || 'Keep up the great work!'}
                </div>`;
        }

        function renderProgressCheckIn() {
            if (!currentPlan) return;
            
            const container = document.getElementById('progressContainer');
            container.innerHTML = '';
            
            const progressGrid = document.createElement('div');
            progressGrid.className = 'progress-options';
            
            currentPlan.sections.forEach(section => {
                if (!section) {
                    console.error('Invalid section data in progress check-in:', section);
                    return;
                }
                
                // Handle different property names from API
                const sectionName = section.name || section.section_name || 'Unknown';
                const topic = section.topic || 'No topic specified';
                
                const card = document.createElement('div');
                card.className = 'progress-card';
                card.innerHTML = `
                    <div class="section-badge ${sectionName.toLowerCase()}">${sectionName}</div>
                    <div style="margin: 10px 0; font-weight: bold;">${topic}</div>
                    <div class="progress-buttons">
                        <button class="progress-btn" data-section="${sectionName}" data-status="completed">Completed</button>
                        <button class="progress-btn" data-section="${sectionName}" data-status="partial">Partial</button>
                        <button class="progress-btn" data-section="${sectionName}" data-status="not-completed">Not Done</button>
                    </div>
                `;
                progressGrid.appendChild(card);
            });
            
            container.appendChild(progressGrid);
            
            // Add click handlers for progress buttons
            document.querySelectorAll('.progress-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const section = this.dataset.section;
                    const status = this.dataset.status;
                    
                    // Remove selected class from siblings
                    this.parentElement.querySelectorAll('.progress-btn').forEach(b => b.classList.remove('selected'));
                    // Add selected class to clicked button
                    this.classList.add('selected');
                    
                    // Store progress
                    progressData[section] = status;
                });
            });
        }

        async function submitProgress() {
            if (Object.keys(progressData).length === 0) {
                showMessage('Please select your progress for each section', 'error');
                return;
            }
            
            const apiKey = document.getElementById('apiKey').value;
            if (!apiKey) {
                showMessage('Please enter your Gemini API key', 'error');
                return;
            }
            
            showLoading(true);
            
            try {
                // Update streak
                const currentStreak = parseInt(localStorage.getItem('studyStreak') || '0');
                const hasCompletedAny = Object.values(progressData).some(status => status === 'completed');
                if (hasCompletedAny) {
                    localStorage.setItem('studyStreak', (currentStreak + 1).toString());
                }
                
                // Generate tomorrow's plan based on progress
                const prompt = createProgressBasedPrompt();
                const response = await callGeminiAPI(prompt, apiKey);
                
                if (!response) {
                    throw new Error('Failed to get response from API');
                }
                
                let newPlan;
                try {
                    newPlan = JSON.parse(response);
                } catch (parseError) {
                    console.error('Failed to parse API response:', response);
                    throw new Error('Invalid response format from API');
                }
                
                // Validate the new plan structure
                if (!newPlan || !newPlan.sections || !Array.isArray(newPlan.sections)) {
                    console.error('Invalid plan structure:', newPlan);
                    throw new Error('API returned invalid study plan format');
                }
                
                currentPlan = newPlan;
                
                // Save new plan
                localStorage.setItem('currentStudyPlan', JSON.stringify(currentPlan));
                localStorage.setItem('lastProgressDate', new Date().toISOString());
                
                // Clear progress data
                progressData = {};
                
                // Refresh dashboard
                updateDashboardStats();
                renderStudyPlan();
                renderProgressCheckIn();
                
                showMessage('Progress submitted! Tomorrow\'s plan generated.', 'success');
                
            } catch (error) {
                console.error('Error submitting progress:', error);
                showMessage('Failed to submit progress. Please try again.', 'error');
            } finally {
                showLoading(false);
            }
        }

        function createProgressBasedPrompt() {
            const tomorrow = new Date();
            tomorrow.setDate(tomorrow.getDate() + 1);
            const tomorrowStr = tomorrow.toLocaleDateString();
            
            const progressSummary = Object.entries(progressData)
                .map(([section, status]) => `${section}: ${status}`)
                .join(', ');
            
            return `Based on today's progress (${progressSummary}), adjust tomorrow's study plan for ${tomorrowStr}.

User Profile:
- Exam Date: ${userProfile.examDate}
- Daily Study Time: ${userProfile.dailyHours} hours
- Target Percentile: ${userProfile.targetPercentile}+
- Proficiency: QA=${userProfile.proficiency.qa}/5, VARC=${userProfile.proficiency.varc}/5, DILR=${userProfile.proficiency.dilr}/5

Adapt the plan based on progress:
- If "completed": advance to next topic/difficulty
- If "partial": reinforce same topic with different approach
- If "not-completed": focus on fundamentals with easier tasks

Return ONLY valid JSON in the same format as before for tomorrow's plan.`;
        }

        function regeneratePlan() {
            if (confirm('Regenerate today\'s study plan? This will replace the current plan.')) {
                generateStudyPlan();
            }
        }

        function resetProfile() {
            if (confirm('Reset your profile and start over? All data will be cleared.')) {
                localStorage.clear();
                userProfile = null;
                currentPlan = null;
                progressData = {};
                
                // Reset form
                document.getElementById('onboardingForm').reset();
                document.querySelectorAll('.rating-btn').forEach(btn => btn.classList.remove('selected'));
                
                // Show onboarding
                document.getElementById('dashboardView').classList.remove('active');
                document.getElementById('onboardingView').classList.add('active');
                
                showMessage('Profile reset successfully', 'success');
            }
        }

        function saveApiKey() {
            const apiKey = document.getElementById('apiKey').value;
            if (apiKey) {
                localStorage.setItem('geminiApiKey', apiKey);
                showMessage('API key saved', 'success');
            }
        }

        async function testApiKey() {
            const apiKey = document.getElementById('apiKey').value;
            if (!apiKey) {
                showMessage('Please enter an API key first', 'error');
                return;
            }

            showLoading(true);
            
            try {
                // Try both v1beta and v1 API versions
                const apiVersions = ['v1beta', 'v1'];
                let foundModels = [];
                
                for (const apiVersion of apiVersions) {
                    try {
                        console.log(`Trying to list models with ${apiVersion}...`);
                        const modelsResponse = await fetch(
                            `https://generativelanguage.googleapis.com/${apiVersion}/models?key=${apiKey}`
                        );
                        
                        if (modelsResponse.ok) {
                            const modelsData = await modelsResponse.json();
                            console.log(`Raw models data from ${apiVersion}:`, modelsData);
                            
                            const availableModels = modelsData.models
                                .filter(model => 
                                    model.supportedGenerationMethods && 
                                    model.supportedGenerationMethods.includes('generateContent')
                                )
                                .map(model => model.name.split('/').pop());
                            
                            console.log(`Available models from ${apiVersion}:`, availableModels);
                            
                            if (availableModels.length > 0) {
                                foundModels = [...foundModels, ...availableModels];
                                showMessage(`API key valid! Found ${availableModels.length} models with ${apiVersion}.`, 'success');
                            }
                        } else {
                            console.log(`${apiVersion} API returned status:`, modelsResponse.status);
                        }
                    } catch (versionError) {
                        console.log(`Error with ${apiVersion}:`, versionError.message);
                    }
                }
                
                // Remove duplicates
                foundModels = [...new Set(foundModels)];
                
                if (foundModels.length > 0) {
                    window.availableModels = foundModels;
                    showMessage(`API key valid! Found ${foundModels.length} total models: ${foundModels.join(', ')}`, 'success');
                } else {
                    showMessage('API key valid but no compatible models found. Your key might be for an older API version.', 'error');
                    // Try to use some common fallback models anyway
                    window.availableModels = ['gemini-pro', 'gemini-1.5-flash'];
                    console.log('Using fallback models:', window.availableModels);
                }
                
            } catch (error) {
                console.error('Error testing API key:', error);
                showMessage('Failed to test API key', 'error');
            } finally {
                showLoading(false);
            }
        }

        function loadApiKey() {
            const apiKey = localStorage.getItem('geminiApiKey');
            if (apiKey) {
                document.getElementById('apiKey').value = apiKey;
            }
        }

        function loadUserProfile() {
            const saved = localStorage.getItem('catUserProfile');
            if (saved) {
                userProfile = JSON.parse(saved);
                
                // Load current plan if exists
                const savedPlan = localStorage.getItem('currentStudyPlan');
                if (savedPlan) {
                    currentPlan = JSON.parse(savedPlan);
                    showDashboard();
                } else {
                    // Show onboarding with pre-filled data
                    populateOnboardingForm();
                }
            }
        }

        function populateOnboardingForm() {
            if (!userProfile) return;
            
            document.getElementById('examDate').value = userProfile.examDate;
            document.getElementById('dailyHours').value = userProfile.dailyHours;
            document.getElementById('targetPercentile').value = userProfile.targetPercentile;
            
            // Set proficiency ratings
            Object.entries(userProfile.proficiency).forEach(([section, rating]) => {
                const btn = document.querySelector(`.rating-selector[data-section="${section}"] .rating-btn[data-value="${rating}"]`);
                if (btn) {
                    btn.click();
                }
            });
        }

        function showLoading(show) {
            const existingLoader = document.querySelector('.loader');
            if (show && !existingLoader) {
                const loader = document.createElement('div');
                loader.className = 'loader';
                document.querySelector('.container').appendChild(loader);
            } else if (!show && existingLoader) {
                existingLoader.remove();
            }
        }

        function showMessage(message, type) {
            // Remove existing messages
            document.querySelectorAll('.error-message, .success-message').forEach(msg => msg.remove());
            
            const messageDiv = document.createElement('div');
            messageDiv.className = type === 'error' ? 'error-message' : 'success-message';
            messageDiv.textContent = message;
            
            document.querySelector('.container').insertBefore(messageDiv, document.querySelector('.container').firstChild);
            
            // Auto-remove after 5 seconds
            setTimeout(() => messageDiv.remove(), 5000);
        }
    </script>
</body>
</html>
