<!DOCTYPE html>
<html>
<head>
    <title>API Test</title>
</head>
<body>
    <h1>Gemini API Test</h1>
    <input type="text" id="apiKey" placeholder="Enter API key" style="width: 400px; padding: 10px;">
    <button onclick="testAPI()" style="padding: 10px 20px;">Test API</button>
    <div id="results" style="margin-top: 20px; white-space: pre-wrap; font-family: monospace;"></div>

    <script>
        async function testAPI() {
            const apiKey = document.getElementById('apiKey').value;
            const results = document.getElementById('results');
            
            if (!apiKey) {
                results.textContent = 'Please enter an API key';
                return;
            }
            
            results.textContent = 'Testing API...\n';
            
            try {
                // Test v1beta models
                results.textContent += '\n=== Testing v1beta API ===\n';
                const v1betaResponse = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`);
                results.textContent += `v1beta Status: ${v1betaResponse.status}\n`;
                
                if (v1betaResponse.ok) {
                    const v1betaData = await v1betaResponse.json();
                    results.textContent += `v1beta Models found: ${v1betaData.models ? v1betaData.models.length : 0}\n`;
                    
                    const v1betaModels = v1betaData.models
                        .filter(model => model.supportedGenerationMethods && model.supportedGenerationMethods.includes('generateContent'))
                        .map(model => model.name.split('/').pop());
                    
                    results.textContent += `v1beta Compatible models: ${v1betaModels.join(', ')}\n`;
                }
                
                // Test v1 models
                results.textContent += '\n=== Testing v1 API ===\n';
                const v1Response = await fetch(`https://generativelanguage.googleapis.com/v1/models?key=${apiKey}`);
                results.textContent += `v1 Status: ${v1Response.status}\n`;
                
                if (v1Response.ok) {
                    const v1Data = await v1Response.json();
                    results.textContent += `v1 Models found: ${v1Data.models ? v1Data.models.length : 0}\n`;
                    
                    const v1Models = v1Data.models
                        .filter(model => model.supportedGenerationMethods && model.supportedGenerationMethods.includes('generateContent'))
                        .map(model => model.name.split('/').pop());
                    
                    results.textContent += `v1 Compatible models: ${v1Models.join(', ')}\n`;
                }
                
                // Test actual API call with a simple prompt
                results.textContent += '\n=== Testing Actual API Call ===\n';
                const testPrompt = "Respond with just: {\"test\": \"success\"}";
                
                const modelsToTry = ['gemini-pro', 'gemini-1.5-flash'];
                
                for (const model of modelsToTry) {
                    try {
                        results.textContent += `\nTrying model: ${model}\n`;
                        
                        const response = await fetch(
                            `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`,
                            {
                                method: "POST",
                                headers: { "Content-Type": "application/json" },
                                body: JSON.stringify({
                                    contents: [{ parts: [{ text: testPrompt }] }]
                                })
                            }
                        );
                        
                        results.textContent += `Status: ${response.status}\n`;
                        
                        if (response.ok) {
                            const data = await response.json();
                            results.textContent += `Success! Response: ${JSON.stringify(data, null, 2)}\n`;
                            break;
                        } else {
                            const errorText = await response.text();
                            results.textContent += `Error: ${errorText}\n`;
                        }
                    } catch (error) {
                        results.textContent += `Failed: ${error.message}\n`;
                    }
                }
                
            } catch (error) {
                results.textContent += `\nError: ${error.message}\n`;
            }
        }
    </script>
</body>
</html>
